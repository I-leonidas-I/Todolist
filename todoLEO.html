<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Minhas Tarefas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FDF6F0;
  --surface:#FFFFFF;
  --surface2:#FFF9F5;
  --pink:#F9C6D0;
  --pink-dark:#C97A8A;
  --pink-text:#7A3A48;
  --lavender:#D9CCEE;
  --lavender-dark:#8B73B8;
  --lavender-text:#4A3370;
  --mint:#C8EAD8;
  --mint-dark:#5BAA7E;
  --mint-text:#1E5C3A;
  --peach:#FAD9C1;
  --peach-dark:#D4855A;
  --peach-text:#6B3A1F;
  --sky:#C6DFF5;
  --sky-dark:#5A9BD4;
  --sky-text:#1A4A72;
  --lemon:#F5F0C0;
  --lemon-dark:#B8A830;
  --lemon-text:#5A4E10;
  --text:#3D2C35;
  --text2:#7A6570;
  --text3:#AE9BA5;
  --border:#EDD9E0;
  --shadow:rgba(200,140,160,0.12);
  --danger:#F2A0A8;
  --danger-text:#8A2030;
  --danger-bg:#FFF0F2;
  --radius:14px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(249,198,208,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(217,204,238,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(200,234,216,0.2) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}
.wrap{
  position:relative;
  z-index:1;
  max-width:540px;
  margin:0 auto;
  padding:2rem 1rem 4rem;
}
.header{margin-bottom:2rem;text-align:center}
.header-emoji{font-size:40px;margin-bottom:8px}
.header h1{
  font-family:'Quicksand',sans-serif;
  font-size:28px;
  font-weight:700;
  color:var(--text);
  margin-bottom:4px;
}
.header p{font-size:13px;color:var(--text2)}

.stats-row{
  display:flex;gap:8px;margin-bottom:1.5rem;
}
.stat-pill{
  flex:1;background:var(--surface);
  border:1px solid var(--border);
  border-radius:99px;
  padding:6px 14px;
  text-align:center;
  font-size:12px;
  color:var(--text2);
}
.stat-pill strong{font-size:15px;font-weight:700;display:block;color:var(--text)}

.input-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem;
  margin-bottom:1.5rem;
  box-shadow:0 4px 20px var(--shadow);
}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input{
  flex:1;
  height:42px;
  padding:0 14px;
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  font-size:14px;
  font-family:'Nunito',sans-serif;
  transition:border-color 0.2s;
}
.input-row input:focus{outline:none;border-color:var(--pink-dark)}
.btn-add{
  height:42px;
  padding:0 18px;
  border-radius:var(--radius-sm);
  border:none;
  background:linear-gradient(135deg,var(--pink) 0%,var(--lavender) 100%);
  color:var(--pink-text);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  white-space:nowrap;
  transition:opacity 0.2s,transform 0.1s;
}
.btn-add:hover{opacity:0.85}
.btn-add:active{transform:scale(0.97)}

.char-row{display:flex;align-items:center;gap:8px}
.char-bar{
  flex:1;height:4px;
  background:var(--border);
  border-radius:99px;
  overflow:hidden;
}
.char-fill{
  height:100%;
  border-radius:99px;
  transition:width 0.15s,background 0.15s;
  background:var(--mint-dark);
}
.char-label{font-size:11px;color:var(--text3);min-width:42px;text-align:right}

.section-title{
  font-family:'Quicksand',sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.07em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:8px;
  padding-left:4px;
}
.task-list{
  display:flex;flex-direction:column;gap:8px;
  margin-bottom:1.5rem;
}
.task-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 12px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  transition:box-shadow 0.2s,transform 0.15s,opacity 0.2s;
  cursor:grab;
  position:relative;
  box-shadow:0 2px 12px var(--shadow);
}
.task-card:active{cursor:grabbing}
.task-card.done{opacity:0.6}
.task-card.dragging{
  opacity:0.4;
  transform:scale(0.98);
  box-shadow:none;
}
.task-card.drag-over{
  border-color:var(--lavender-dark);
  box-shadow:0 0 0 2px var(--lavender);
}

.task-color-bar{
  position:absolute;
  left:0;top:8px;bottom:8px;
  width:4px;
  border-radius:99px;
}
.task-inner{
  flex:1;display:flex;align-items:flex-start;gap:10px;
  padding-left:10px;
}
.check-btn{
  width:20px;height:20px;min-width:20px;
  border-radius:50%;
  border:2px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
  transition:background 0.15s,border-color 0.15s;
  background:transparent;
  flex-shrink:0;
}
.check-btn.checked{background:var(--mint-dark);border-color:var(--mint-dark)}
.check-btn.checked::after{
  content:'';
  display:block;
  width:5px;height:9px;
  border:2px solid #fff;
  border-top:none;border-left:none;
  transform:rotate(45deg) translate(-1px,-1px);
}
.task-body{flex:1;min-width:0}
.task-text{
  font-size:14px;
  line-height:1.55;
  color:var(--text);
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.task-card.done .task-text{
  text-decoration:line-through;
  color:var(--text3);
}
.task-meta{
  font-size:11px;
  color:var(--text3);
  margin-top:3px;
  display:flex;align-items:center;gap:4px;
}
.task-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.icon-btn{
  width:28px;height:28px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;
  font-size:14px;
  color:var(--text2);
}
.icon-btn:hover.edit-btn{background:var(--lemon);border-color:var(--lemon-dark);color:var(--lemon-text)}
.icon-btn:hover.del-btn{background:var(--danger-bg);border-color:var(--danger);color:var(--danger-text)}
.drag-handle{
  width:20px;height:20px;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:3px;cursor:grab;flex-shrink:0;
  opacity:0.35;
  transition:opacity 0.15s;
  margin-top:2px;
}
.drag-handle:hover{opacity:0.7}
.drag-handle span{
  display:block;width:14px;height:2px;
  background:var(--text2);border-radius:99px;
}

.edit-input{
  flex:1;
  font-size:14px;
  font-family:'Nunito',sans-serif;
  color:var(--text);
  border:1.5px solid var(--lavender-dark);
  border-radius:6px;
  padding:2px 8px;
  background:var(--surface2);
  line-height:1.5;
  resize:none;
  min-height:44px;
}
.edit-input:focus{outline:none}
.edit-actions{
  display:flex;gap:4px;margin-top:6px;
}
.edit-save,.edit-cancel{
  padding:3px 12px;border-radius:6px;
  font-size:12px;font-weight:700;
  font-family:'Nunito',sans-serif;
  cursor:pointer;border:1px solid transparent;
}
.edit-save{background:var(--mint);color:var(--mint-text);border-color:var(--mint-dark)}
.edit-cancel{background:var(--border);color:var(--text2)}

.empty{
  text-align:center;
  padding:3rem 1rem;
  color:var(--text3);
  font-size:14px;
  line-height:1.8;
}
.empty-emoji{font-size:40px;display:block;margin-bottom:8px}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(120,80,90,0.3);
  backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:1rem;
  animation:fadeIn 0.15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:1.75rem 1.5rem;
  max-width:320px;width:100%;
  text-align:center;
  box-shadow:0 8px 40px rgba(180,120,140,0.2);
  animation:popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.modal-icon{font-size:36px;margin-bottom:10px}
.modal-title{font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.modal-msg{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.65}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btns button{
  height:38px;padding:0 22px;
  border-radius:99px;
  font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;
  border:1.5px solid transparent;
  transition:opacity 0.15s;
}
.modal-btns button:hover{opacity:0.8}
.btn-cancel{background:var(--border);color:var(--text2);border-color:var(--border)}
.btn-del-confirm{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger)}
.btn-ok{background:var(--pink);color:var(--pink-text);border-color:var(--pink-dark)}
.hidden{display:none!important}

/* color coding */
.color-0{background:var(--pink)}
.color-1{background:var(--lavender)}
.color-2{background:var(--mint)}
.color-3{background:var(--peach)}
.color-4{background:var(--sky)}
.color-5{background:var(--lemon)}

@media(max-width:400px){
  .header h1{font-size:22px}
  .modal{padding:1.25rem 1rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-emoji">🌸</div>
    <h1>Minhas Tarefas</h1>
    <p>Organize seu dia com carinho ✨</p>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-pill"><strong id="statPend">0</strong>Pendentes</div>
    <div class="stat-pill"><strong id="statDone">0</strong>Concluídas</div>
    <div class="stat-pill"><strong id="statTotal">0</strong>Total</div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Digite uma nova tarefa…" maxlength="60"/>
      <button class="btn-add" id="btnAdd">+ Adicionar</button>
    </div>
    <div class="char-row">
      <div class="char-bar"><div class="char-fill" id="charFill" style="width:0%"></div></div>
      <span class="char-label" id="charLabel">0 / 60</span>
    </div>
  </div>

  <div id="pendSection" class="hidden">
    <div class="section-title">📋 Pendentes</div>
    <div class="task-list" id="pendList"></div>
  </div>

  <div id="doneSection" class="hidden">
    <div class="section-title">✅ Concluídas</div>
    <div class="task-list" id="doneList"></div>
  </div>

  <div id="emptyMsg" class="empty">
    <span class="empty-emoji">🌷</span>
    Nenhuma tarefa ainda.<br>Adicione a primeira acima!
  </div>
</div>

<!-- Modal exclusão -->
<div class="overlay hidden" id="modalDel">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <p class="modal-title">Excluir tarefa?</p>
    <p class="modal-msg" id="modalDelMsg"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalDel')">Cancelar</button>
      <button class="btn-del-confirm" id="btnConfirmDel">Excluir</button>
    </div>
  </div>
</div>

<!-- Modal aviso -->
<div class="overlay hidden" id="modalWarn">
  <div class="modal">
    <div class="modal-icon" id="warnIcon"></div>
    <p class="modal-title" id="warnTitle"></p>
    <p class="modal-msg" id="warnMsg"></p>
    <div class="modal-btns">
      <button class="btn-ok" onclick="closeModal('modalWarn')">Entendido</button>
    </div>
  </div>
</div>

<script>
const MAX = 10, MAXC = 60;
let tasks = [], dragSrcId = null;

const colors = ['color-0','color-1','color-2','color-3','color-4','color-5'];
let colorIdx = 0;

function load(){
  try{tasks=JSON.parse(localStorage.getItem('todo_v3')||'[]')}catch(e){tasks=[]}
  render();
}
function save(){
  try{localStorage.setItem('todo_v3',JSON.stringify(tasks))}catch(e){}
}
function genId(){return Date.now()+Math.random().toString(36).slice(2)}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s}
function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})
    +' às '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

const inp=document.getElementById('taskInput');
const charFill=document.getElementById('charFill');
const charLabel=document.getElementById('charLabel');

inp.addEventListener('input',()=>{
  const l=inp.value.length;
  const p=(l/MAXC)*100;
  charFill.style.width=p+'%';
  charFill.style.background=p>=100?'#F2A0A8':p>80?'#F5C87A':'#5BAA7E';
  charLabel.textContent=l+' / '+MAXC;
  charLabel.style.color=p>=100?'var(--danger-text)':'var(--text3)';
  if(l>=MAXC){
    showWarn('⚠️','Limite de caracteres!','Você atingiu o limite de '+MAXC+' caracteres por tarefa.');
    inp.value=inp.value.slice(0,MAXC);
  }
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});

const btnAdd=document.getElementById('btnAdd');
btnAdd.addEventListener('click',addTask);
btnAdd.addEventListener('touchend',function(e){e.preventDefault();addTask();});

function addTask(){
  const v=inp.value.trim();
  if(!v){showWarn('✏️','Campo vazio!','Por favor, escreva uma tarefa antes de adicionar.');return}
  if(tasks.filter(t=>!t.done).length>=MAX){
    showWarn('🚫','Limite atingido!','Você já tem '+MAX+' tarefas pendentes. Conclua ou remova alguma antes de adicionar mais.');return;
  }
  const c=colors[colorIdx%colors.length]; colorIdx++;
  tasks.unshift({id:genId(),text:cap(v),done:false,color:c,doneAt:null});
  inp.value=''; charFill.style.width='0%'; charLabel.textContent='0 / '+MAXC;
  charFill.style.background='#5BAA7E'; charLabel.style.color='var(--text3)';
  save(); render();
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?Date.now():null;
  save(); render();
}

function askDel(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  document.getElementById('modalDelMsg').textContent='"'+t.text.slice(0,60)+(t.text.length>60?'…':'')+'"';
  document.getElementById('btnConfirmDel').onclick=()=>{
    tasks=tasks.filter(x=>x.id!==id);
    closeModal('modalDel'); save(); render();
  };
  document.getElementById('modalDel').classList.remove('hidden');
}

function startEdit(id){
  render(id);
}

function saveEdit(id){
  const ta=document.getElementById('edit_'+id);
  if(!ta)return;
  const v=ta.value.trim();
  if(!v){showWarn('✏️','Campo vazio!','A tarefa não pode ficar em branco.');return}
  if(v.length>MAXC){showWarn('⚠️','Muito longo!','Máximo de '+MAXC+' caracteres.');return}
  const t=tasks.find(x=>x.id===id);
  if(t){t.text=cap(v);}
  save(); render();
}

function closeModal(id){document.getElementById(id).classList.add('hidden')}
function showWarn(icon,title,msg){
  document.getElementById('warnIcon').textContent=icon;
  document.getElementById('warnTitle').textContent=title;
  document.getElementById('warnMsg').textContent=msg;
  document.getElementById('modalWarn').classList.remove('hidden');
}

// ---- Drag & Drop ----
function onDragStart(e,id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{
    const el=document.querySelector('[data-id="'+id+'"]');
    if(el)el.classList.add('dragging');
  },0);
}
function onDragEnd(e,id){
  document.querySelectorAll('.task-card').forEach(c=>{
    c.classList.remove('dragging','drag-over');
  });
}
function onDragOver(e,id){
  e.preventDefault();
  if(id===dragSrcId)return;
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
  const el=document.querySelector('[data-id="'+id+'"]');
  if(el)el.classList.add('drag-over');
}
function onDrop(e,id){
  e.preventDefault();
  if(!dragSrcId||dragSrcId===id)return;
  const srcIdx=tasks.findIndex(x=>x.id===dragSrcId);
  const dstIdx=tasks.findIndex(x=>x.id===id);
  // only reorder within same group (pend<->pend, done<->done)
  const src=tasks[srcIdx], dst=tasks[dstIdx];
  if(src.done!==dst.done)return;
  tasks.splice(srcIdx,1);
  const newDst=tasks.findIndex(x=>x.id===id);
  tasks.splice(newDst,0,src);
  dragSrcId=null; save(); render();
}

// ---- Touch Drag ----
let touchDragId=null, touchClone=null, touchOffX=0, touchOffY=0;

function onTouchStart(e,id){
  const el=e.currentTarget;
  const rect=el.getBoundingClientRect();
  touchDragId=id;
  touchOffX=e.touches[0].clientX-rect.left;
  touchOffY=e.touches[0].clientY-rect.top;
  touchClone=el.cloneNode(true);
  Object.assign(touchClone.style,{
    position:'fixed',top:rect.top+'px',left:rect.left+'px',
    width:rect.width+'px',opacity:'0.85',pointerEvents:'none',
    zIndex:9999,transition:'none',boxShadow:'0 8px 24px rgba(0,0,0,0.15)'
  });
  document.body.appendChild(touchClone);
  el.style.opacity='0.3';
}
function onTouchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const tx=e.touches[0].clientX-touchOffX;
  const ty=e.touches[0].clientY-touchOffY;
  touchClone.style.left=tx+'px';
  touchClone.style.top=ty+'px';
  document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
  document.elementsFromPoint(e.touches[0].clientX,e.touches[0].clientY).forEach(el=>{
    if(el.classList&&el.classList.contains('task-card')&&el.dataset.id!==touchDragId){
      el.classList.add('drag-over');
    }
  });
}
function onTouchEnd(e){
  if(!touchClone)return;
  const tx=e.changedTouches[0].clientX;
  const ty=e.changedTouches[0].clientY;
  let targetId=null;
  document.elementsFromPoint(tx,ty).forEach(el=>{
    if(el.classList&&el.classList.contains('task-card')&&el.dataset.id&&el.dataset.id!==touchDragId){
      targetId=el.dataset.id;
    }
  });
  document.querySelectorAll('.task-card').forEach(c=>{c.classList.remove('drag-over');c.style.opacity=''});
  touchClone.remove(); touchClone=null;
  if(targetId){
    const srcIdx=tasks.findIndex(x=>x.id===touchDragId);
    const dstIdx=tasks.findIndex(x=>x.id===targetId);
    const src=tasks[srcIdx],dst=tasks[dstIdx];
    if(src.done===dst.done){
      tasks.splice(srcIdx,1);
      const nd=tasks.findIndex(x=>x.id===targetId);
      tasks.splice(nd,0,src);
      save();
    }
  }
  touchDragId=null; render();
}

document.addEventListener('touchmove',onTouchMove,{passive:false});
document.addEventListener('touchend',onTouchEnd);

// ---- Render ----
function makeCard(t,editId){
  const card=document.createElement('div');
  card.className='task-card'+(t.done?' done':'');
  card.dataset.id=t.id;
  card.draggable=true;
  card.ondragstart=e=>onDragStart(e,t.id);
  card.ondragend=e=>onDragEnd(e,t.id);
  card.ondragover=e=>onDragOver(e,t.id);
  card.ondrop=e=>onDrop(e,t.id);
  card.addEventListener('touchstart',e=>onTouchStart(e,t.id),{passive:true});

  const bar=document.createElement('div');
  bar.className='task-color-bar '+(t.color||'color-0');
  card.appendChild(bar);

  const inner=document.createElement('div');
  inner.className='task-inner';

  const handle=document.createElement('div');
  handle.className='drag-handle';
  handle.innerHTML='<span></span><span></span><span></span>';
  inner.appendChild(handle);

  const chk=document.createElement('div');
  chk.className='check-btn'+(t.done?' checked':'');
  chk.title=t.done?'Marcar como pendente':'Marcar como concluída';
  chk.onclick=()=>toggleDone(t.id);
  inner.appendChild(chk);

  const body=document.createElement('div');
  body.className='task-body';

  if(editId===t.id){
    const ta=document.createElement('textarea');
    ta.className='edit-input';
    ta.id='edit_'+t.id;
    ta.value=t.text;
    ta.maxLength=MAXC;
    ta.rows=2;
    body.appendChild(ta);
    const ea=document.createElement('div');
    ea.className='edit-actions';
    const sv=document.createElement('button');
    sv.className='edit-save';sv.textContent='Salvar';
    sv.onclick=()=>saveEdit(t.id);
    const cn=document.createElement('button');
    cn.className='edit-cancel';cn.textContent='Cancelar';
    cn.onclick=()=>render();
    ea.appendChild(sv);ea.appendChild(cn);
    body.appendChild(ea);
    setTimeout(()=>{ta.focus();ta.selectionStart=ta.value.length},50);
  }else{
    const txt=document.createElement('div');
    txt.className='task-text';
    txt.textContent=t.text;
    body.appendChild(txt);
    if(t.done&&t.doneAt){
      const meta=document.createElement('div');
      meta.className='task-meta';
      meta.innerHTML='✓ Concluída em '+fmtDate(t.doneAt);
      body.appendChild(meta);
    }
  }
  inner.appendChild(body);

  const acts=document.createElement('div');
  acts.className='task-actions';

  if(editId!==t.id){
    const editBtn=document.createElement('button');
    editBtn.className='icon-btn edit-btn';
    editBtn.title='Editar';
    editBtn.textContent='✎';
    editBtn.onclick=()=>startEdit(t.id);
    acts.appendChild(editBtn);
  }

  const delBtn=document.createElement('button');
  delBtn.className='icon-btn del-btn';
  delBtn.title='Excluir';
  delBtn.textContent='×';
  delBtn.onclick=()=>askDel(t.id);
  acts.appendChild(delBtn);

  inner.appendChild(acts);
  card.appendChild(inner);
  return card;
}

function render(editId){
  const pend=tasks.filter(t=>!t.done);
  const done=tasks.filter(t=>t.done);

  const pl=document.getElementById('pendList');
  const dl=document.getElementById('doneList');
  pl.innerHTML=''; dl.innerHTML='';

  pend.forEach(t=>pl.appendChild(makeCard(t,editId)));
  done.forEach(t=>dl.appendChild(makeCard(t,editId)));

  document.getElementById('pendSection').classList.toggle('hidden',pend.length===0);
  document.getElementById('doneSection').classList.toggle('hidden',done.length===0);
  document.getElementById('emptyMsg').classList.toggle('hidden',tasks.length>0);

  const sr=document.getElementById('statsRow');
  sr.style.display=tasks.length?'flex':'none';
  document.getElementById('statPend').textContent=pend.length;
  document.getElementById('statDone').textContent=done.length;
  document.getElementById('statTotal').textContent=tasks.length;
}

load();
</script>
</body>
</html>
